<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Room</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; }
  #gc { display:block; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
(function(){

var canvas = document.getElementById('gc');
var W = window.innerWidth, H = window.innerHeight;

var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

/* ── Post-processing: vignette blur + chromatic aberration ── */
// Рендерим сцену в текстуру
var rtWidth  = W * Math.min(window.devicePixelRatio, 2);
var rtHeight = H * Math.min(window.devicePixelRatio, 2);
var renderTarget = new THREE.WebGLRenderTarget(rtWidth, rtHeight, {
  minFilter: THREE.LinearFilter,
  magFilter: THREE.LinearFilter,
  format: THREE.RGBAFormat,
});

// Fullscreen quad
var postScene  = new THREE.Scene();
var postCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
var postGeo    = new THREE.PlaneGeometry(2, 2);
var postMat    = new THREE.ShaderMaterial({
  uniforms: {
    tDiffuse:   { value: renderTarget.texture },
    uRes:       { value: new THREE.Vector2(rtWidth, rtHeight) },
    uCA:        { value: 0.009 },  // сила chromatic aberration
    uVigBlur:   { value: 1.2  },  // сила размытия по краям
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 uRes;
    uniform float uCA;
    uniform float uVigBlur;
    varying vec2 vUv;

    // Быстрое размытие: усредняем несколько выборок в радиусе
    vec4 blurSample(sampler2D tex, vec2 uv, float radius) {
      vec4 col = vec4(0.0);
      float total = 0.0;
      float step = radius / 3.0;
      for(float x = -3.0; x <= 3.0; x += 1.0) {
        for(float y = -3.0; y <= 3.0; y += 1.0) {
          vec2 offset = vec2(x, y) * step / uRes;
          vec2 sampleUv = clamp(uv + offset, 0.001, 0.999);
          col += texture2D(tex, sampleUv);
          total += 1.0;
        }
      }
      return col / total;
    }

    void main() {
      vec2 uv = vUv;
      // Расстояние от центра (0=центр, 1=угол)
      vec2 fromCenter = uv - 0.5;
      float dist = length(fromCenter) * 1.414; // нормируем к 1 в углах

      // Chromatic aberration — смещаем R и B каналы от центра
      float ca = uCA * dist * dist;
      vec2 caDir = normalize(fromCenter + 0.0001) * ca;
      float r = texture2D(tDiffuse, uv + caDir).r;
      float g = texture2D(tDiffuse, uv).g;
      float b = texture2D(tDiffuse, uv - caDir).b;
      vec4 sharp = vec4(r, g, b, 1.0);

      // Vignette blur — размываем по краям
      float blurRadius = uVigBlur * dist * dist * dist * 12.0;
      vec4 blurred = blurSample(tDiffuse, uv, blurRadius);

      // Смешиваем: центр = резкий, края = размытый (без затемнения)
      float blend = smoothstep(0.15, 0.7, dist);
      vec4 col = mix(sharp, blurred, blend);
      // Без viignette — только blur
      col.rgb *= 1.4; // компенсируем затемнение от blur

      // Тёмная виньетка — убрана
      // col.rgb *= vignette;

      // Без tonemapping — чистый цвет
      gl_FragColor = col;
    }
  `,
  depthWrite: false,
});
var postMesh = new THREE.Mesh(postGeo, postMat);
postScene.add(postMesh);

var scene  = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(75, W/H, 0.1, 1000);
camera.position.set(0, 0, 0);

/* ── Освещение ── */
var dirLight = new THREE.DirectionalLight(0xffe4a0, 0.4);
dirLight.position.set(0, 1, 0);
scene.add(dirLight);

var ambient = new THREE.AmbientLight(0xffe4a0, 1.1);
scene.add(ambient);

/* ── Macintosh по центру ── */
var gltfLoader = new THREE.GLTFLoader();
gltfLoader.load(
  'https://raw.githubusercontent.com/CakeBoxDeveloper/3d/main/Table.glb',
  function(gltf){
    var model = gltf.scene;
    // Автомасштаб — вписываем в ~0.8 единицы высоты
    var box  = new THREE.Box3().setFromObject(model);
    var size = box.getSize(new THREE.Vector3());
    var maxDim = Math.max(size.x, size.y, size.z);
    var scale  = 0.8 / maxDim;
    model.scale.setScalar(scale * 5);
    box.setFromObject(model);
    var center = box.getCenter(new THREE.Vector3());
    model.position.set(-0.6, -box.min.y - 1.2, -0.5);
    model.rotation.y = 0;
    scene.add(model);

    // Включаем тени на всех мешах модели
    model.traverse(function(node) {
      if(node.isMesh) {
        node.castShadow    = true;
        node.receiveShadow = true;
      }
    });
    // Анимации
    if(gltf.animations && gltf.animations.length){
      scene._mixer = new THREE.AnimationMixer(model);
      gltf.animations.forEach(function(clip){
        scene._mixer.clipAction(clip).play();
      });
    }
  },
  undefined,
  function(err){ console.warn('macintosh.glb error:', err); }
);

var geo = new THREE.SphereGeometry(500, 64, 32);
geo.scale(-1, 1, 1);
var sphere = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0x222222}));
// Сфера в мировых координатах — смещена вперёд от стартовой позиции камеры
camera.remove(sphere);
scene.add(sphere);
sphere.position.set(-200, 0, 0);
camera.position.set(0, 0, 0);
scene.add(sphere);

new THREE.TextureLoader().load(
  'https://raw.githubusercontent.com/CakeBoxDeveloper/3d/main/room.webp',
  function(tex){
    tex.encoding = THREE.sRGBEncoding;
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    sphere.material = new THREE.MeshBasicMaterial({map:tex, side:THREE.FrontSide});
  }
);

/* ── Управление ── */
var qT = new THREE.Quaternion(), qC = new THREE.Quaternion();
var _e  = new THREE.Euler(), _q1 = new THREE.Quaternion(), _q2 = new THREE.Quaternion();
var gyroOn = false, SLERP = 0.08;
var dy = Math.PI / 2, dp = 0.05, dn = false, lx = null, ly = null;
_e.set(dp, dy, 0, 'YXZ'); qT.setFromEuler(_e);

function screenAngle(){
  return (window.screen && window.screen.orientation)
    ? (window.screen.orientation.angle || 0)
    : (window.orientation || 0);
}
function onOri(e){
  if(e.alpha === null) return;
  gyroOn = true;
  _e.set(
    THREE.MathUtils.degToRad(e.beta),
    THREE.MathUtils.degToRad(e.alpha),
   -THREE.MathUtils.degToRad(e.gamma),
    'YXZ'
  );
  qT.setFromEuler(_e);
  _q1.setFromAxisAngle(new THREE.Vector3(1,0,0), -Math.PI/2);
  qT.multiply(_q1);
  _q2.setFromAxisAngle(new THREE.Vector3(0,0,1), THREE.MathUtils.degToRad(screenAngle()));
  qT.multiply(_q2);
}
function startGyro(){
  if(typeof DeviceOrientationEvent !== 'undefined' &&
     typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission()
      .then(function(s){ if(s==='granted') window.addEventListener('deviceorientation',onOri,true); })
      .catch(function(){});
  } else {
    window.addEventListener('deviceorientation', onOri, true);
  }
}
var permDone = false;
document.addEventListener('touchstart', function(){
  if(!permDone){ permDone=true; startGyro(); }
}, {once:true});
startGyro();

canvas.addEventListener('mousedown', function(e){ dn=true; lx=e.clientX; ly=e.clientY; });
window.addEventListener('mouseup',   function(){ dn=false; });
window.addEventListener('mousemove', function(e){
  if(!dn || gyroOn) return;
  dy -= (e.clientX - lx) * 0.003;
  dp -= (e.clientY - ly) * 0.003;
  dp = Math.max(-0.5, Math.min(1.4, dp));
  lx = e.clientX; ly = e.clientY;
  _e.set(dp, dy, 0, 'YXZ'); qT.setFromEuler(_e);
});

var tx = null, ty = null;
canvas.addEventListener('touchstart', function(e){
  if(!gyroOn){ var t=e.touches[0]; tx=t.clientX; ty=t.clientY; }
}, {passive:true});
canvas.addEventListener('touchmove', function(e){
  if(gyroOn) return;
  var t = e.touches[0];
  if(tx !== null){
    dy -= (t.clientX - tx) * 0.004;
    dp -= (t.clientY - ty) * 0.004;
    dp = Math.max(-0.5, Math.min(1.4, dp));
    _e.set(dp, dy, 0, 'YXZ'); qT.setFromEuler(_e);
  }
  tx = t.clientX; ty = t.clientY;
}, {passive:true});

window.addEventListener('resize', function(){
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W/H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
  var dpr = Math.min(window.devicePixelRatio, 2);
  renderTarget.setSize(W * dpr, H * dpr);
  postMat.uniforms.uRes.value.set(W * dpr, H * dpr);
});

var lastTime = 0;
function animate(now){
  requestAnimationFrame(animate);
  var dt = lastTime ? Math.min((now - lastTime)/1000, 0.1) : 0;
  lastTime = now;
  if(scene._mixer) scene._mixer.update(dt);
  qC.slerp(qT, SLERP);
  camera.quaternion.copy(qC);
  // Рендер сцены в текстуру
  renderer.setRenderTarget(renderTarget);
  renderer.render(scene, camera);
  // Пост-обработка на экран
  renderer.setRenderTarget(null);
  renderer.render(postScene, postCamera);
}
animate(0);

})();
</script>
</body>
</html>
