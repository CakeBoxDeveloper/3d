<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Room</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; }
  #gc { display:block; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
(function(){

var canvas = document.getElementById('gc');
var W = window.innerWidth, H = window.innerHeight;

var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.outputEncoding = THREE.sRGBEncoding;

var scene  = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(75, W/H, 0.1, 1000);
camera.position.set(0, 0, 0);

/* ── Сфера ── */
var geo = new THREE.SphereGeometry(500, 64, 32);
geo.scale(-1, 1, 1);
var sphere = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0x222222}));
scene.add(sphere);

new THREE.TextureLoader().load(
  'https://raw.githubusercontent.com/CakeBoxDeveloper/3d/main/room.jpeg',
  function(tex){
    tex.encoding = THREE.sRGBEncoding;
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    sphere.material = new THREE.MeshBasicMaterial({map:tex, side:THREE.FrontSide});
  }
);

/* ── Управление ── */
var qT = new THREE.Quaternion(), qC = new THREE.Quaternion();
var _e  = new THREE.Euler(), _q1 = new THREE.Quaternion(), _q2 = new THREE.Quaternion();
var gyroOn = false, SLERP = 0.08;
var dy = 0, dp = 0.05, dn = false, lx = null, ly = null;
_e.set(dp, dy, 0, 'YXZ'); qT.setFromEuler(_e);

function screenAngle(){
  return (window.screen && window.screen.orientation)
    ? (window.screen.orientation.angle || 0)
    : (window.orientation || 0);
}
function onOri(e){
  if(e.alpha === null) return;
  gyroOn = true;
  _e.set(
    THREE.MathUtils.degToRad(e.beta),
    THREE.MathUtils.degToRad(e.alpha),
   -THREE.MathUtils.degToRad(e.gamma),
    'YXZ'
  );
  qT.setFromEuler(_e);
  _q1.setFromAxisAngle(new THREE.Vector3(1,0,0), -Math.PI/2);
  qT.multiply(_q1);
  _q2.setFromAxisAngle(new THREE.Vector3(0,0,1), THREE.MathUtils.degToRad(screenAngle()));
  qT.multiply(_q2);
}
function startGyro(){
  if(typeof DeviceOrientationEvent !== 'undefined' &&
     typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission()
      .then(function(s){ if(s==='granted') window.addEventListener('deviceorientation',onOri,true); })
      .catch(function(){});
  } else {
    window.addEventListener('deviceorientation', onOri, true);
  }
}
var permDone = false;
document.addEventListener('touchstart', function(){
  if(!permDone){ permDone=true; startGyro(); }
}, {once:true});
startGyro();

canvas.addEventListener('mousedown', function(e){ dn=true; lx=e.clientX; ly=e.clientY; });
window.addEventListener('mouseup',   function(){ dn=false; });
window.addEventListener('mousemove', function(e){
  if(!dn || gyroOn) return;
  dy -= (e.clientX - lx) * 0.003;
  dp -= (e.clientY - ly) * 0.003;
  dp = Math.max(-0.5, Math.min(1.4, dp));
  lx = e.clientX; ly = e.clientY;
  _e.set(dp, dy, 0, 'YXZ'); qT.setFromEuler(_e);
});

var tx = null, ty = null;
canvas.addEventListener('touchstart', function(e){
  if(!gyroOn){ var t=e.touches[0]; tx=t.clientX; ty=t.clientY; }
}, {passive:true});
canvas.addEventListener('touchmove', function(e){
  if(gyroOn) return;
  var t = e.touches[0];
  if(tx !== null){
    dy -= (t.clientX - tx) * 0.004;
    dp -= (t.clientY - ty) * 0.004;
    dp = Math.max(-0.5, Math.min(1.4, dp));
    _e.set(dp, dy, 0, 'YXZ'); qT.setFromEuler(_e);
  }
  tx = t.clientX; ty = t.clientY;
}, {passive:true});

window.addEventListener('resize', function(){
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W/H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

function animate(){
  requestAnimationFrame(animate);
  qC.slerp(qT, SLERP);
  camera.quaternion.copy(qC);
  renderer.render(scene, camera);
}
animate();

})();
</script>
</body>
</html>
