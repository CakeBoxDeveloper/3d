<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Room</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; }
  #gc { display:block; }
  #loader {
    position:fixed; top:0; left:0; width:100%; height:100%;
    z-index:999; background:#000;
    overflow:hidden;
    transition: opacity 0.6s;
  }
  /* Картинка 1920×1080 — на десктопе покрывает весь экран */
  #loader-img {
    position:absolute;
    /* Центрируем */
    top:50%; left:50%;
    transform:translate(-50%, -50%);
    /* Десктоп: масштабируем чтобы покрыть весь экран */
    width:100vw;
    height:100vh;
    object-fit:cover;
    object-position:center center;
  }
  /* Телефон: показываем только центральную треть (1/3 ширины 1920px = 640px)
     Эффект достигается масштабированием картинки так, чтобы её высота = 100vh,
     а потом overflow:hidden обрезает края */
  @media (max-width: 768px) {
    #loader-img {
      /* Высота = 100vh, ширина пропорциональна 1920/1080 */
      width:auto;
      height:100vh;
      /* Показываем только центр — object-fit здесь не нужен,
         картинка шире экрана и центрирована, края обрезаны overflow:hidden */
      object-fit:unset;
    }
  }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="loader">
  <video id="loader-img" autoplay muted loop playsinline
    src="https://raw.githubusercontent.com/CakeBoxDeveloper/3d/main/LWebm.webm">
  </video>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
(function(){

var canvas = document.getElementById('gc');
var W = window.innerWidth, H = window.innerHeight;
var _loaderStart = Date.now();

var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.outputEncoding = THREE.LinearEncoding;

var scene  = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(75, W/H, 0.1, 1000);
camera.position.set(0, 0, 0);

/* ── Освещение ── */
var ambient = new THREE.AmbientLight(0xffffff, 1);
scene.add(ambient);

/* ── Post-processing: blur по краям + chromatic aberration ── */
var dpr = Math.min(window.devicePixelRatio, 2);
var rt = new THREE.WebGLRenderTarget(W * dpr, H * dpr, {
  minFilter: THREE.LinearFilter,
  magFilter: THREE.LinearFilter,
  format: THREE.RGBAFormat,
});
var postScene  = new THREE.Scene();
var postCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
var postMat = new THREE.ShaderMaterial({
  uniforms: {
    tDiffuse: { value: rt.texture },
    uRes:     { value: new THREE.Vector2(W * dpr, H * dpr) },
    uCA:      { value: 0.009 },
    uVigBlur: { value: 0.84  },
    uBright:  { value: 1.35  },
    uMotion:  { value: new THREE.Vector2(0, 0) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 uRes;
    uniform float uCA;
    uniform float uVigBlur;
    uniform float uBright;
    uniform vec2 uMotion;
    varying vec2 vUv;

    vec4 blurSample(sampler2D tex, vec2 uv, float radius) {
      vec4 col = vec4(0.0);
      float s = radius / 3.0;
      for(float x = -3.0; x <= 3.0; x += 1.0)
        for(float y = -3.0; y <= 3.0; y += 1.0) {
          vec2 suv = clamp(uv + vec2(x,y)*s/uRes, 0.001, 0.999);
          col += texture2D(tex, suv);
        }
      return col / 49.0;
    }

    void main() {
      vec2 fc   = vUv - 0.5;
      float dist = length(fc) * 1.414;

      // Хроматическая аберрация
      float ca  = uCA * dist * dist;
      vec2 dir  = normalize(fc + 0.0001) * ca;
      float r = texture2D(tDiffuse, vUv + dir).r;
      float g = texture2D(tDiffuse, vUv      ).g;
      float b = texture2D(tDiffuse, vUv - dir).b;
      vec4 sharp = vec4(r, g, b, 1.0);

      // Виньетка-блюр: сильнее по бокам (по X), слабее сверху/снизу
      float sideBlur = abs(fc.x) * 2.0; // 0 в центре, 1 на краях по X
      float blurR  = uVigBlur * (dist * dist * dist * 8.0 + sideBlur * sideBlur * sideBlur * 11.0);
      vec4 blurred = blurSample(tDiffuse, vUv, blurR);
      float blend  = smoothstep(0.25, 0.8, dist);
      vec4 col = mix(sharp, blurred, blend);

      // Motion blur по вектору движения камеры
      float motLen = length(uMotion);
      if(motLen > 0.0002) {
        vec2 step = uMotion / 8.0;
        vec4 mCol = col;
        for(int i = 1; i <= 7; i++) {
          vec2 suv = clamp(vUv + step * float(i), 0.001, 0.999);
          mCol += texture2D(tDiffuse, suv);
        }
        col = mix(col, mCol / 8.0, smoothstep(0.0002, 0.012, motLen));
      }

      // Яркость
      col.rgb *= uBright;

      gl_FragColor = col;
    }
  `,
  depthWrite: false,
});
postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), postMat));

/* ── Сфера ── */
var geo = new THREE.SphereGeometry(500, 64, 32);
geo.scale(-1, 1, 1);
var sphere = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0x111111}));
sphere.position.set(0, 0, 0);
scene.add(sphere);

new THREE.TextureLoader().load(
  'https://raw.githubusercontent.com/CakeBoxDeveloper/3d/main/room.webp',
  function(tex){
    tex.encoding = THREE.LinearEncoding;
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    sphere.material = new THREE.MeshBasicMaterial({map:tex, side:THREE.FrontSide});
    var minShow = 2000; // минимум 2 секунды
    var elapsed = Date.now() - _loaderStart;
    var delay = Math.max(0, minShow - elapsed);
    setTimeout(function(){
      var el = document.getElementById('loader');
      if(el){ el.style.opacity='0'; setTimeout(function(){ el.style.display='none'; }, 650); }
    }, delay);
  }
);

/* ── Управление ── */
var qT=new THREE.Quaternion(), qC=new THREE.Quaternion();
var _e=new THREE.Euler(), _q1=new THREE.Quaternion(), _q2=new THREE.Quaternion();
var gyroOn=false, SLERP=0.08;
var dy=Math.PI/2, dp=0.05, dn=false, lx=null, ly=null;
_e.set(dp,dy,0,'YXZ'); qT.setFromEuler(_e);

function screenAngle(){ return (window.screen&&window.screen.orientation)?(window.screen.orientation.angle||0):(window.orientation||0); }
function onOri(e){
  if(e.alpha===null) return; gyroOn=true;
  _e.set(THREE.MathUtils.degToRad(e.beta),THREE.MathUtils.degToRad(e.alpha),-THREE.MathUtils.degToRad(e.gamma),'YXZ');
  qT.setFromEuler(_e);
  _q1.setFromAxisAngle(new THREE.Vector3(1,0,0),-Math.PI/2); qT.multiply(_q1);
  _q2.setFromAxisAngle(new THREE.Vector3(0,0,1),THREE.MathUtils.degToRad(screenAngle())); qT.multiply(_q2);
}
function startGyro(){
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(function(s){if(s==='granted')window.addEventListener('deviceorientation',onOri,true);}).catch(function(){});
  } else { window.addEventListener('deviceorientation',onOri,true); }
}
var permDone=false;
document.addEventListener('touchstart',function(){if(!permDone){permDone=true;startGyro();}},{once:true});
startGyro();

canvas.addEventListener('mousedown',function(e){dn=true;lx=e.clientX;ly=e.clientY;});
window.addEventListener('mouseup',function(){dn=false;});
window.addEventListener('mousemove',function(e){
  if(!dn||gyroOn) return;
  dy-=(e.clientX-lx)*0.003; dp-=(e.clientY-ly)*0.003;
  dp=Math.max(-0.5,Math.min(1.4,dp)); lx=e.clientX; ly=e.clientY;
  _e.set(dp,dy,0,'YXZ'); qT.setFromEuler(_e);
});
var tx=null,ty=null;
canvas.addEventListener('touchstart',function(e){if(!gyroOn){var t=e.touches[0];tx=t.clientX;ty=t.clientY;}},{passive:true});
canvas.addEventListener('touchmove',function(e){
  if(gyroOn) return; var t=e.touches[0];
  if(tx!==null){dy-=(t.clientX-tx)*0.004;dp-=(t.clientY-ty)*0.004;dp=Math.max(-0.5,Math.min(1.4,dp));_e.set(dp,dy,0,'YXZ');qT.setFromEuler(_e);}
  tx=t.clientX; ty=t.clientY;
},{passive:true});

window.addEventListener('resize',function(){
  W=window.innerWidth; H=window.innerHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
  rt.setSize(W*dpr, H*dpr);
  postMat.uniforms.uRes.value.set(W*dpr, H*dpr);
});

/* ── Render loop ── */
var lastTime=0;
var qPrev = new THREE.Quaternion();
var _qDelta = new THREE.Quaternion();
var _axis = new THREE.Vector3();
function animate(now){
  requestAnimationFrame(animate);
  var dt=lastTime?Math.min((now-lastTime)/1000,0.1):0; lastTime=now;
  if(scene._mixer) scene._mixer.update(dt);

  qPrev.copy(qC);
  qC.slerp(qT,SLERP);
  camera.quaternion.copy(qC);

  // Вектор движения: разница между текущим и предыдущим кватернионом
  // qDelta = qC * qPrev^-1
  _qDelta.copy(qPrev).invert().premultiply(qC);
  var angle = 2 * Math.acos(Math.min(1, Math.abs(_qDelta.w)));
  var motionX = 0, motionY = 0;
  if(angle > 0.00001){
    _axis.set(_qDelta.x, _qDelta.y, _qDelta.z).normalize();
    // Проецируем ось вращения на экранные оси
    // Y-вращение → горизонтальный сдвиг UV, X-вращение → вертикальный
    var strength = Math.min(angle * 3.0, 0.03); // клампим максимум
    motionX = -_axis.y * angle * strength * 30.0;
    motionY =  _axis.x * angle * strength * 30.0;
  }
  postMat.uniforms.uMotion.value.set(motionX, motionY);

  renderer.setRenderTarget(rt);
  renderer.render(scene,camera);
  renderer.setRenderTarget(null);
  renderer.render(postScene,postCamera);
}
animate(0);

})();
</script>
</body>
</html>
