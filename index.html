<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D друк у Миколаєві</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; }
  #gc { display:block; }
  #loader {
    position:fixed; top:0; left:0; width:100%; height:100%;
    z-index:999; background:#000;
    overflow:hidden;
    transition: opacity 0.6s;
  }
  /* Картинка 1920×1080 — на десктопе покрывает весь экран */
  #loader-img {
    position:absolute;
    /* Центрируем */
    top:50%; left:50%;
    transform:translate(-50%, -50%);
    /* Десктоп: масштабируем чтобы покрыть весь экран */
    width:100vw;
    height:100vh;
    object-fit:cover;
    object-position:center center;
  }
  /* ── Grain overlay ── */
  #grain {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none;
    z-index:100;
    opacity:0.03;
    image-rendering:pixelated;
  }
  /* ── iPhone gyro overlay — DOS стиль ── */
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  #gyro-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 10000;
    background: rgba(0, 0, 0, 0.82);
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
  }
  .dos-window {
    background: #000;
    border: 2px solid #aaa;
    box-shadow: 4px 4px 0 #555, inset 0 0 0 1px #333;
    padding: 0;
    width: min(88vw, 420px);
    color: #c8c8c8;
  }
  .dos-titlebar {
    background: #aaa;
    color: #000;
    font-size: 13px;
    padding: 3px 8px;
    letter-spacing: 0.05em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .dos-titlebar span { opacity: 0.6; font-size: 11px; }
  .dos-body {
    padding: 22px 20px 20px;
    font-size: 13px;
    line-height: 1.7;
    letter-spacing: 0.04em;
    border-top: 1px solid #333;
  }
  .dos-body .dos-prompt {
    color: #888;
    margin-bottom: 14px;
  }
  .dos-body .dos-prompt::before { content: 'C:\\> '; color: #aaa; }
  .dos-text {
    color: #e0e0d0;
    margin-bottom: 24px;
    font-size: 13px;
    line-height: 1.8;
  }
  .dos-text .blink {
    animation: blink 1.1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .dos-footer {
    border-top: 1px solid #333;
    padding: 12px 20px;
    display: flex;
    justify-content: flex-end;
  }
  .dos-btn {
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    background: #aaa;
    color: #000;
    border: none;
    padding: 6px 22px;
    cursor: pointer;
    box-shadow: 2px 2px 0 #555;
    -webkit-tap-highlight-color: transparent;
    text-transform: uppercase;
    transition: background 0.1s;
  }
  .dos-btn:active {
    background: #888;
    box-shadow: none;
    transform: translate(2px, 2px);
  }
  /* Телефон: только центральная треть */
  @media (max-width: 768px) {
    #loader-img {
      /* Высота = 100vh, ширина пропорциональна 1920/1080 */
      width:auto;
      height:100vh;
      object-fit:unset;
    }
  }
</style>
</head>
<body>
<!-- iPhone gyro overlay — DOS стиль -->
<div id="gyro-overlay">
  <div class="dos-window">
    <div class="dos-titlebar">
      SYSTEM REQUEST<span>[ gyroscope.exe ]</span>
    </div>
    <div class="dos-body">
      <div class="dos-prompt">GYROSCOPE_INIT</div>
      <div class="dos-text">
        Для корректного отображения<br>
        требуется доступ к датчику<br>
        ориентации устройства.<br><br>
        Нажмите &laquo;ОК&raquo; для продолжения<span class="blink">_</span>
      </div>
    </div>
    <div class="dos-footer">
      <button class="dos-btn" id="gyro-ok">[ OK ]</button>
    </div>
  </div>
</div>
<canvas id="grain"></canvas>
<canvas id="gc"></canvas>
<div id="loader">
  <video id="loader-img" autoplay muted loop playsinline
    src="https://raw.githubusercontent.com/CakeBoxDeveloper/3d/main/LWebm.webm">
  </video>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
(function(){

var canvas = document.getElementById('gc');
var W = window.innerWidth, H = window.innerHeight;
var _loaderStart = Date.now();

var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.outputEncoding = THREE.LinearEncoding;

var scene  = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(75, W/H, 0.1, 1000);
camera.position.set(0, 0, 0);

/* ── Освещение ── */
var ambient = new THREE.AmbientLight(0xffffff, 1);
scene.add(ambient);

/* ── Post-processing: blur по краям + chromatic aberration ── */
var dpr = Math.min(window.devicePixelRatio, 2);
var rt = new THREE.WebGLRenderTarget(W * dpr, H * dpr, {
  minFilter: THREE.LinearFilter,
  magFilter: THREE.LinearFilter,
  format: THREE.RGBAFormat,
});
var postScene  = new THREE.Scene();
var postCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
var postMat = new THREE.ShaderMaterial({
  uniforms: {
    tDiffuse: { value: rt.texture },
    uRes:     { value: new THREE.Vector2(W * dpr, H * dpr) },
    uCA:      { value: 0.009 },
    uVigBlur: { value: 0.84  },
    uBright:  { value: 1.1   },
    uMotion:  { value: new THREE.Vector2(0, 0) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 uRes;
    uniform float uCA;
    uniform float uVigBlur;
    uniform float uBright;
    uniform vec2 uMotion;
    varying vec2 vUv;

    float grain(vec2 uv, float t) {
      vec2 p = floor(uv * vec2(1920.0, 1080.0));
      float frame = floor(t * 24.0);
      vec2 q = p + frame * vec2(0.0, 1.0);
      q = fract(q * vec2(0.1031, 0.1030));
      q += dot(q, q.yx + 33.33);
      return fract((q.x + q.y) * q.x);
    }



    vec4 blurSample(sampler2D tex, vec2 uv, float radius) {
      vec2 s = vec2(radius / 3.0) / uRes;
      vec4 c = vec4(0.0);
      c += texture2D(tex, clamp(uv + vec2(-3.0,-3.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2(-2.0,-3.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2(-1.0,-3.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2( 0.0,-3.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2( 1.0,-3.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2( 2.0,-3.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2( 3.0,-3.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2(-3.0, 0.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2(-2.0, 0.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2(-1.0, 0.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2( 0.0, 0.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2( 1.0, 0.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2( 2.0, 0.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2( 3.0, 0.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2(-3.0, 3.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2(-2.0, 3.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2(-1.0, 3.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2( 0.0, 3.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2( 1.0, 3.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2( 2.0, 3.0)*s, 0.001, 0.999));
      c += texture2D(tex, clamp(uv + vec2( 3.0, 3.0)*s, 0.001, 0.999));
      return c / 21.0;
    }

    void main() {
      vec2 fc    = vUv - 0.5;
      float dist = length(fc) * 1.414;

      // Хроматическая аберрация
      float ca   = uCA * dist * dist;
      vec2 caDir = normalize(fc + 0.0001) * ca;
      float rCh  = texture2D(tDiffuse, vUv + caDir).r;
      float gCh  = texture2D(tDiffuse, vUv        ).g;
      float bCh  = texture2D(tDiffuse, vUv - caDir).b;
      vec4 sharp = vec4(rCh, gCh, bCh, 1.0);

      // Виньетка-блюр: сильнее по бокам
      float sideBlur = abs(fc.x) * 2.0;
      float blurR    = uVigBlur * (dist*dist*dist*8.0 + sideBlur*sideBlur*sideBlur*11.0);
      vec4 blurred   = blurSample(tDiffuse, vUv, blurR);
      float blend    = smoothstep(0.25, 0.8, dist);
      vec4 col       = mix(sharp, blurred, blend);

      // Motion blur — без if, weight=0 при нет движения
      vec2 mStep   = uMotion / 8.0;
      float motLen = length(uMotion);
      float motW   = smoothstep(0.0002, 0.012, motLen);
      vec4 mCol    = col;
      mCol += texture2D(tDiffuse, clamp(vUv + mStep * 1.0, 0.001, 0.999));
      mCol += texture2D(tDiffuse, clamp(vUv + mStep * 2.0, 0.001, 0.999));
      mCol += texture2D(tDiffuse, clamp(vUv + mStep * 3.0, 0.001, 0.999));
      mCol += texture2D(tDiffuse, clamp(vUv + mStep * 4.0, 0.001, 0.999));
      mCol += texture2D(tDiffuse, clamp(vUv + mStep * 5.0, 0.001, 0.999));
      mCol += texture2D(tDiffuse, clamp(vUv + mStep * 6.0, 0.001, 0.999));
      mCol += texture2D(tDiffuse, clamp(vUv + mStep * 7.0, 0.001, 0.999));
      col = mix(col, mCol / 8.0, motW);

      // Яркость
      col.rgb *= uBright;

      gl_FragColor = col;
    }
  `,
  depthWrite: false,
});
postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), postMat));

/* ── Сфера ── */
var geo = new THREE.SphereGeometry(500, 64, 32);
geo.scale(-1, 1, 1);
var sphere = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0x111111}));
sphere.position.set(0, 0, 0);
scene.add(sphere);

new THREE.TextureLoader().load(
  'https://raw.githubusercontent.com/CakeBoxDeveloper/3d/main/room.webp',
  function(tex){
    tex.encoding = THREE.LinearEncoding;
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    sphere.material = new THREE.MeshBasicMaterial({map:tex, side:THREE.FrontSide});
    var minShow = 2000; // минимум 2 секунды
    var elapsed = Date.now() - _loaderStart;
    var delay = Math.max(0, minShow - elapsed);
    setTimeout(function(){
      var el = document.getElementById('loader');
      if(el){ el.style.opacity='0'; setTimeout(function(){ el.style.display='none'; }, 650); }
    }, delay);
  }
);

/* ── Управление ── */
var qT=new THREE.Quaternion(), qC=new THREE.Quaternion();
var _e=new THREE.Euler(), _q1=new THREE.Quaternion(), _q2=new THREE.Quaternion();
var gyroOn=false, SLERP=0.08;
var dy=Math.PI/2, dp=0.05, dn=false, lx=null, ly=null;
_e.set(dp,dy,0,'YXZ'); qT.setFromEuler(_e);

function screenAngle(){ return (window.screen&&window.screen.orientation)?(window.screen.orientation.angle||0):(window.orientation||0); }
function onOri(e){
  if(e.alpha===null) return; gyroOn=true;
  _e.set(THREE.MathUtils.degToRad(e.beta),THREE.MathUtils.degToRad(e.alpha),-THREE.MathUtils.degToRad(e.gamma),'YXZ');
  qT.setFromEuler(_e);
  _q1.setFromAxisAngle(new THREE.Vector3(1,0,0),-Math.PI/2); qT.multiply(_q1);
  _q2.setFromAxisAngle(new THREE.Vector3(0,0,1),THREE.MathUtils.degToRad(screenAngle())); qT.multiply(_q2);
}
function startGyro(){
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(function(s){if(s==='granted')window.addEventListener('deviceorientation',onOri,true);}).catch(function(){});
  } else { window.addEventListener('deviceorientation',onOri,true); }
}

// iPhone — показываем оверлей с запросом гироскопа
var isIphone = /iPhone/i.test(navigator.userAgent||'');

function showGyroOverlay(){
  var ov = document.getElementById('gyro-overlay');
  ov.style.transition = '';
  ov.style.opacity = '1';
  ov.style.display = 'flex';
}
function hideGyroOverlay(){
  var ov = document.getElementById('gyro-overlay');
  ov.style.transition = 'opacity 0.5s';
  ov.style.opacity = '0';
  setTimeout(function(){ ov.style.display = 'none'; }, 520);
}

// Глобальная функция для вызова из консоли
window.showGyro = showGyroOverlay;

document.getElementById('gyro-ok').addEventListener('click', function(){
  startGyro();
  hideGyroOverlay();
});

if(isIphone && typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
  showGyroOverlay();
} else {
  var permDone = false;
  document.addEventListener('touchstart', function(){ if(!permDone){ permDone=true; startGyro(); } }, {once:true});
  startGyro();
}canvas.addEventListener('mousedown',function(e){dn=true;lx=e.clientX;ly=e.clientY;});
window.addEventListener('mouseup',function(){dn=false;});
window.addEventListener('mousemove',function(e){
  if(!dn||gyroOn) return;
  dy-=(e.clientX-lx)*0.003; dp-=(e.clientY-ly)*0.003;
  dp=Math.max(-0.5,Math.min(1.4,dp)); lx=e.clientX; ly=e.clientY;
  _e.set(dp,dy,0,'YXZ'); qT.setFromEuler(_e);
});
var tx=null,ty=null;
canvas.addEventListener('touchstart',function(e){if(!gyroOn){var t=e.touches[0];tx=t.clientX;ty=t.clientY;}},{passive:true});
canvas.addEventListener('touchmove',function(e){
  if(gyroOn) return; var t=e.touches[0];
  if(tx!==null){dy-=(t.clientX-tx)*0.004;dp-=(t.clientY-ty)*0.004;dp=Math.max(-0.5,Math.min(1.4,dp));_e.set(dp,dy,0,'YXZ');qT.setFromEuler(_e);}
  tx=t.clientX; ty=t.clientY;
},{passive:true});

window.addEventListener('resize',function(){
  W=window.innerWidth; H=window.innerHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
  rt.setSize(W*dpr, H*dpr);
  postMat.uniforms.uRes.value.set(W*dpr, H*dpr);
  // Сброс при смене ориентации — избегаем артефакта моушн блюра
  qC.copy(qT);
});

/* ── Render loop ── */
var lastTime=0;
var qPrev = new THREE.Quaternion();
var _qDelta = new THREE.Quaternion();
var _axis = new THREE.Vector3();
function animate(now){
  requestAnimationFrame(animate);
  var dt=lastTime?Math.min((now-lastTime)/1000,0.1):0; lastTime=now;
  if(scene._mixer) scene._mixer.update(dt);

  qPrev.copy(qC);
  qC.slerp(qT,SLERP);
  camera.quaternion.copy(qC);

  // Вектор движения: разница между текущим и предыдущим кватернионом
  // qDelta = qC * qPrev^-1
  _qDelta.copy(qPrev).invert().premultiply(qC);
  var angle = 2 * Math.acos(Math.min(1, Math.abs(_qDelta.w)));
  var motionX = 0, motionY = 0;
  if(angle > 0.00001){
    _axis.set(_qDelta.x, _qDelta.y, _qDelta.z).normalize();
    var strength = Math.min(angle * 3.0, 0.03);
    // На мобильных с гироскопом усиливаем эффект
    var mobileBoost = gyroOn ? 2.5 : 1.0;
    motionX = -_axis.y * angle * strength * 30.0 * mobileBoost;
    motionY =  _axis.x * angle * strength * 30.0 * mobileBoost;
  }
  postMat.uniforms.uMotion.value.set(motionX, motionY);

  renderer.setRenderTarget(rt);
  renderer.render(scene,camera);
  renderer.setRenderTarget(null);
  renderer.render(postScene,postCamera);
}
animate(0);

})();
</script>

<script>
/* ── Film grain overlay (CSS canvas) ── */
(function(){
  var gc = document.getElementById('grain');
  var ctx = gc.getContext('2d');
  var W, H, imgData, buf;

  function resize(){
    W = window.innerWidth;
    H = window.innerHeight;
    // Вдвое меньше пикселей — CSS растянет, зерно будет крупнее
    gc.width  = Math.ceil(W / 2);
    gc.height = Math.ceil(H / 2);
    imgData = ctx.createImageData(gc.width, gc.height);
    buf = imgData.data;
  }
  resize();
  window.addEventListener('resize', resize);

  var fps = 24, interval = 1000 / fps, last = 0;

  function drawGrain(now){
    requestAnimationFrame(drawGrain);
    if(now - last < interval) return;
    last = now;

    var len = buf.length;
    for(var i = 0; i < len; i += 4){
      var v = (Math.random() * 255) | 0;
      buf[i]   = v;
      buf[i+1] = v;
      buf[i+2] = v;
      buf[i+3] = 255;
    }
    ctx.putImageData(imgData, 0, 0);
  }
  requestAnimationFrame(drawGrain);
})();
</script>
</body>
</html>
