<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Room</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; }
  #gc { display:block; }
  #loader {
    position:fixed; top:0; left:0; width:100%; height:100%;
    z-index:999; background:#000;
    display:flex; align-items:center; justify-content:center;
    transition: opacity 0.6s;
  }
  #loader-video { width:20vw; }
  @media (max-width: 768px) { #loader-video { width:70vw; } }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="loader">
  <video id="loader-video" autoplay muted loop playsinline
    src="https://raw.githubusercontent.com/CakeBoxDeveloper/3d/main/Lite2ruk.webm">
  </video>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
(function(){

var canvas = document.getElementById('gc');
var W = window.innerWidth, H = window.innerHeight;

var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.outputEncoding = THREE.sRGBEncoding;

var scene  = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(75, W/H, 0.1, 1000);
camera.position.set(0, 0, 0);

/* ── Освещение ── */
var dirLight = new THREE.DirectionalLight(0xffe4a0, 1.4);
dirLight.position.set(0, 1, 0);
scene.add(dirLight);
var ambient = new THREE.AmbientLight(0xffe4a0, 1);
scene.add(ambient);

/* ── Post-processing: blur по краям + chromatic aberration ── */
var dpr = Math.min(window.devicePixelRatio, 2);
var rt = new THREE.WebGLRenderTarget(W * dpr, H * dpr, {
  minFilter: THREE.LinearFilter,
  magFilter: THREE.LinearFilter,
  format: THREE.RGBAFormat,
});
var postScene  = new THREE.Scene();
var postCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
var postMat = new THREE.ShaderMaterial({
  uniforms: {
    tDiffuse: { value: rt.texture },
    uRes:     { value: new THREE.Vector2(W * dpr, H * dpr) },
    uCA:      { value: 0.009 },
    uVigBlur: { value: 0.84  },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 uRes;
    uniform float uCA;
    uniform float uVigBlur;
    varying vec2 vUv;

    vec4 blurSample(sampler2D tex, vec2 uv, float radius) {
      vec4 col = vec4(0.0);
      float s = radius / 3.0;
      for(float x = -3.0; x <= 3.0; x += 1.0)
        for(float y = -3.0; y <= 3.0; y += 1.0) {
          vec2 suv = clamp(uv + vec2(x,y)*s/uRes, 0.001, 0.999);
          col += texture2D(tex, suv);
        }
      return col / 49.0;
    }

    // Bloom: большое размытие только ярких пикселей
    vec3 bloomSample(sampler2D tex, vec2 uv) {
      vec3 col = vec3(0.0);
      float total = 0.0;
      float r = 8.0;
      for(float x = -4.0; x <= 4.0; x += 1.0)
        for(float y = -4.0; y <= 4.0; y += 1.0) {
          vec2 suv = clamp(uv + vec2(x,y)*r/uRes, 0.001, 0.999);
          vec3 s = texture2D(tex, suv).rgb;
          float lum = dot(s, vec3(0.299, 0.587, 0.114));
          // Берём только яркие пиксели (threshold 0.7)
          col += s * max(0.0, lum - 0.7) * 3.0;
          total += 1.0;
        }
      return col / total;
    }

    void main() {
      vec2 fc   = vUv - 0.5;
      float dist = length(fc) * 1.414;
      float ca   = uCA * dist * dist;
      vec2 dir   = normalize(fc + 0.0001) * ca;
      float r = texture2D(tDiffuse, vUv + dir).r;
      float g = texture2D(tDiffuse, vUv      ).g;
      float b = texture2D(tDiffuse, vUv - dir).b;
      vec4 sharp   = vec4(r, g, b, 1.0);
      float blurR  = uVigBlur * dist * dist * dist * 12.0;
      vec4 blurred = blurSample(tDiffuse, vUv, blurR);
      float blend  = smoothstep(0.25, 0.8, dist);
      vec4 col = mix(sharp, blurred, blend);

      // Добавляем bloom поверх
      vec3 bloom = bloomSample(tDiffuse, vUv);
      col.rgb += bloom * 0.4;

      gl_FragColor = col;
    }
  `,
  depthWrite: false,
});
postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), postMat));

/* ── Сфера ── */
var geo = new THREE.SphereGeometry(500, 64, 32);
geo.scale(-1, 1, 1);
var sphere = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0x111111}));
sphere.position.set(-200, 0, 0);
scene.add(sphere);

new THREE.TextureLoader().load(
  'https://raw.githubusercontent.com/CakeBoxDeveloper/3d/main/room.webp',
  function(tex){
    tex.encoding = THREE.sRGBEncoding;
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    sphere.material = new THREE.MeshBasicMaterial({map:tex, side:THREE.FrontSide});
  }
);

/* ── Стол ── */
var gltfLoader = new THREE.GLTFLoader();
gltfLoader.load(
  'https://raw.githubusercontent.com/CakeBoxDeveloper/3d/main/Table.glb',
  function(gltf){
    var model = gltf.scene;
    var box   = new THREE.Box3().setFromObject(model);
    var size  = box.getSize(new THREE.Vector3());
    var scale = 0.8 / Math.max(size.x, size.y, size.z);
    model.scale.setScalar(scale * 5);
    box.setFromObject(model);
    model.position.set(-0.6, -box.min.y - 1.2, -0.5);
    model.rotation.y = 0;
    scene.add(model);

    // Убираем только пересвет emissive — оставляем слабое свечение
    model.traverse(function(node){
      if(node.isMesh && node.material){
        var mats = Array.isArray(node.material) ? node.material : [node.material];
        mats.forEach(function(m){
          if(m.emissiveIntensity > 0.3) m.emissiveIntensity = 0.3;
          m.needsUpdate = true;
        });
      }
    });

    if(gltf.animations && gltf.animations.length){
      scene._mixer = new THREE.AnimationMixer(model);
      gltf.animations.forEach(function(c){ scene._mixer.clipAction(c).play(); });
    }

    // Скрываем лоадер
    var el = document.getElementById('loader');
    if(el){ el.style.opacity='0'; setTimeout(function(){ el.style.display='none'; }, 650); }
  },
  undefined,
  function(err){ console.warn(err); }
);

/* ── Управление ── */
var qT=new THREE.Quaternion(), qC=new THREE.Quaternion();
var _e=new THREE.Euler(), _q1=new THREE.Quaternion(), _q2=new THREE.Quaternion();
var gyroOn=false, SLERP=0.08;
var dy=Math.PI/2, dp=0.05, dn=false, lx=null, ly=null;
_e.set(dp,dy,0,'YXZ'); qT.setFromEuler(_e);

function screenAngle(){ return (window.screen&&window.screen.orientation)?(window.screen.orientation.angle||0):(window.orientation||0); }
function onOri(e){
  if(e.alpha===null) return; gyroOn=true;
  _e.set(THREE.MathUtils.degToRad(e.beta),THREE.MathUtils.degToRad(e.alpha),-THREE.MathUtils.degToRad(e.gamma),'YXZ');
  qT.setFromEuler(_e);
  _q1.setFromAxisAngle(new THREE.Vector3(1,0,0),-Math.PI/2); qT.multiply(_q1);
  _q2.setFromAxisAngle(new THREE.Vector3(0,0,1),THREE.MathUtils.degToRad(screenAngle())); qT.multiply(_q2);
}
function startGyro(){
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(function(s){if(s==='granted')window.addEventListener('deviceorientation',onOri,true);}).catch(function(){});
  } else { window.addEventListener('deviceorientation',onOri,true); }
}
var permDone=false;
document.addEventListener('touchstart',function(){if(!permDone){permDone=true;startGyro();}},{once:true});
startGyro();

canvas.addEventListener('mousedown',function(e){dn=true;lx=e.clientX;ly=e.clientY;});
window.addEventListener('mouseup',function(){dn=false;});
window.addEventListener('mousemove',function(e){
  if(!dn||gyroOn) return;
  dy-=(e.clientX-lx)*0.003; dp-=(e.clientY-ly)*0.003;
  dp=Math.max(-0.5,Math.min(1.4,dp)); lx=e.clientX; ly=e.clientY;
  _e.set(dp,dy,0,'YXZ'); qT.setFromEuler(_e);
});
var tx=null,ty=null;
canvas.addEventListener('touchstart',function(e){if(!gyroOn){var t=e.touches[0];tx=t.clientX;ty=t.clientY;}},{passive:true});
canvas.addEventListener('touchmove',function(e){
  if(gyroOn) return; var t=e.touches[0];
  if(tx!==null){dy-=(t.clientX-tx)*0.004;dp-=(t.clientY-ty)*0.004;dp=Math.max(-0.5,Math.min(1.4,dp));_e.set(dp,dy,0,'YXZ');qT.setFromEuler(_e);}
  tx=t.clientX; ty=t.clientY;
},{passive:true});

window.addEventListener('resize',function(){
  W=window.innerWidth; H=window.innerHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
  rt.setSize(W*dpr, H*dpr);
  postMat.uniforms.uRes.value.set(W*dpr, H*dpr);
});

/* ── Render loop ── */
var lastTime=0;
function animate(now){
  requestAnimationFrame(animate);
  var dt=lastTime?Math.min((now-lastTime)/1000,0.1):0; lastTime=now;
  if(scene._mixer) scene._mixer.update(dt);
  qC.slerp(qT,SLERP);
  camera.quaternion.copy(qC);
  renderer.setRenderTarget(rt);
  renderer.render(scene,camera);
  renderer.setRenderTarget(null);
  renderer.render(postScene,postCamera);
}
animate(0);

})();
</script>
</body>
</html>
